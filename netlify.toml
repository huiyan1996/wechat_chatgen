[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
  NETLIFY = "true"
  SECRETS_SCAN_OMIT_KEYS = "JWT_SECRET,MONGODB_URI,NUXT_JWT_SECRET,NUXT_MONGO_URI"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["mongoose", "bcryptjs", "jsonwebtoken"]
